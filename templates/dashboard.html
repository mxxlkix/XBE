<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f19;
  color:white;
}

.glass {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
}

.container {
  padding:40px;
}

.avatar {
  width:80px;
  border-radius:50%;
}
</style>
</head>

<body>

<div class="container">

  <div class="glass">
    <img class="avatar"
    src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png">

    <h2>{{ user.username }}</h2>
    <p>ID: {{ user.id }}</p>

    <a href="/logout">Logout</a>
  </div>

</div>

</body>
</html>
